<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <!-- Base light gradient 135deg -->
    <linearGradient id="baseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <!-- Dark overlay gradient -->
    <linearGradient id="darkOverlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(26, 31, 29, 0.38)"/>
      <stop offset="100%" stop-color="rgba(26, 31, 29, 0.28)"/>
    </linearGradient>
    <!-- Fabric pattern from hero-fabric.svg -->
    <pattern id="fabricPatternHero" x="0" y="0" width="40" height="30" patternUnits="userSpaceOnUse">
      <g opacity="0.14" stroke="#198754" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 C20 3.5 24 3.5 24 6 V9"/>
        <path d="M10 18 L20 12 L30 18"/>
        <line x1="13" y1="18" x2="27" y2="18"/>
      </g>
    </pattern>
  </defs>
  
  <!-- Layer 1: Base light gradient -->
  <rect width="200" height="200" fill="url(#baseGradient)"/>
  <!-- Layer 2: Fabric pattern -->
  <rect width="200" height="200" fill="url(#fabricPatternHero)"/>
  <!-- Layer 3: Dark overlay -->
  <rect width="200" height="200" fill="url(#darkOverlay)"/>
  
  <!-- Shopping bag -->
  <g transform="translate(100, 85)">
    <!-- Bag -->
    <path d="M -28 2 L -26 28 Q -26 34 -18 36 L 18 36 Q 26 34 26 28 L 28 2 Z" fill="#fff" stroke="#fff" stroke-width="2" stroke-linejoin="round"/>
    <path d="M -18 2 Q -18 -18 0 -20 Q 18 -18 18 2" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Happy character visible in bag -->
    <circle cx="0" cy="8" r="8" fill="#e8f5e9"/>
    <circle cx="-3" cy="6" r="1.8" fill="#2e7d32"/>
    <circle cx="3" cy="6" r="1.8" fill="#2e7d32"/>
    <path d="M -3 9 Q 0 11 3 9" fill="none" stroke="#2e7d32" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Folded clothes -->
    <rect x="-16" y="18" width="32" height="8" fill="#fff" opacity="0.95" rx="1.5"/>
  </g>
  
  <!-- Text below bucket -->
  <text x="100" y="140" font-family="Georgia, serif" font-size="16" font-weight="700" text-anchor="middle" fill="#fff">bu-krama.by</text>
</svg>